<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIN-GCP Elevation Comparison</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>TIN-GCP Elevation Comparison</h1>
            <p class="subtitle">Upload your LandXML TIN surface and GCP CSV to compare elevations</p>
        </header>

        <main>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-section">
                    <div class="file-upload-box">
                        <label for="tin_file" class="file-label">
                            <div class="file-label-content">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <span class="file-label-text">TIN Surface (LandXML)</span>
                                <span class="file-label-hint">Click to select or drag and drop</span>
                            </div>
                            <input type="file" id="tin_file" name="tin_file" accept=".xml" required>
                            <span class="file-name" id="tin_file_name">No file selected</span>
                        </label>
                    </div>

                    <div class="file-upload-box">
                        <label for="gcp_file" class="file-label">
                            <div class="file-label-content">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <span class="file-label-text">GCP Data (CSV)</span>
                                <span class="file-label-hint">Click to select or drag and drop</span>
                            </div>
                            <input type="file" id="gcp_file" name="gcp_file" accept=".csv" required>
                            <span class="file-name" id="gcp_file_name">No file selected</span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <span class="btn-text">Compare Elevations</span>
                        <span class="btn-loader" id="loader" style="display: none;">
                            <span class="spinner"></span>
                            Processing...
                        </span>
                    </button>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </form>
        </main>
    </div>

    <script>
        // File input handlers
        const tinFileInput = document.getElementById('tin_file');
        const gcpFileInput = document.getElementById('gcp_file');
        const tinFileName = document.getElementById('tin_file_name');
        const gcpFileName = document.getElementById('gcp_file_name');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = submitBtn.querySelector('.btn-text');
        const errorMessage = document.getElementById('errorMessage');

        // Update file name display
        tinFileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                tinFileName.textContent = e.target.files[0].name;
                tinFileName.parentElement.classList.add('has-file');
            } else {
                tinFileName.textContent = 'No file selected';
                tinFileName.parentElement.classList.remove('has-file');
            }
        });

        gcpFileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                gcpFileName.textContent = e.target.files[0].name;
                gcpFileName.parentElement.classList.add('has-file');
            } else {
                gcpFileName.textContent = 'No file selected';
                gcpFileName.parentElement.classList.remove('has-file');
            }
        });

        // Drag and drop handlers
        const fileBoxes = document.querySelectorAll('.file-upload-box');
        fileBoxes.forEach(box => {
            const input = box.querySelector('input[type="file"]');
            const fileName = box.querySelector('.file-name');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                box.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                box.addEventListener(eventName, () => box.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                box.addEventListener(eventName, () => box.classList.remove('drag-over'), false);
            });

            box.addEventListener('drop', function(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length > 0) {
                    input.files = files;
                    fileName.textContent = files[0].name;
                    fileName.parentElement.classList.add('has-file');
                }
            }, false);
        });

        // Form submission
        uploadForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide previous errors
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';

            // Validate files
            if (!tinFileInput.files[0] || !gcpFileInput.files[0]) {
                showError('Please select both TIN and GCP files');
                return;
            }

            // Validate file extensions client-side
            const tinFile = tinFileInput.files[0];
            const gcpFile = gcpFileInput.files[0];
            const tinExt = tinFile.name.split('.').pop().toLowerCase();
            const gcpExt = gcpFile.name.split('.').pop().toLowerCase();

            if (tinExt !== 'xml') {
                showError(`Invalid TIN file type. Expected .xml, got .${tinExt}`);
                return;
            }

            if (gcpExt !== 'csv') {
                showError(`Invalid GCP file type. Expected .csv, got .${gcpExt}`);
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'inline-flex';

            // Create form data
            const formData = new FormData();
            formData.append('tin_file', tinFileInput.files[0]);
            formData.append('gcp_file', gcpFileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const contentType = response.headers.get('content-type');
                
                if (response.ok) {
                    if (contentType && contentType.includes('text/html')) {
                        // Get HTML response and replace page content
                        const html = await response.text();
                        document.open();
                        document.write(html);
                        document.close();
                    } else {
                        // Unexpected response type
                        console.error('Unexpected response type:', contentType);
                        showError('Unexpected response format');
                        submitBtn.disabled = false;
                        btnText.style.display = 'inline';
                        loader.style.display = 'none';
                    }
                } else {
                    // Try to parse as JSON for error message
                    let errorMsg = `Server error (${response.status}): `;
                    try {
                        const data = await response.json();
                        errorMsg += data.error || 'An error occurred during processing';
                        console.error('Server error:', data);
                    } catch (e) {
                        try {
                            const text = await response.text();
                            errorMsg += text || 'An error occurred during processing';
                            console.error('Server error (text):', text);
                        } catch (e2) {
                            errorMsg += 'Unable to parse error message';
                            console.error('Error parsing response:', e2);
                        }
                    }
                    showError(errorMsg);
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    loader.style.display = 'none';
                }
            } catch (error) {
                console.error('Network error:', error);
                showError('Network error: ' + error.message);
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                loader.style.display = 'none';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            // Scroll to error message
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
            // Also log to console for debugging
            console.error('Error:', message);
        }
    </script>
</body>
</html>
